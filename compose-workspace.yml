x-logging: &base-logging
  driver: 'json-file'
  options:
    max-size: '10m'
    max-file: '5'
services:
  workspace:
    init: true
    build:
      context: ./dockerfiles/node
      target: workspace
      args:
        - USER_NAME=${USER_NAME:-node}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging: *base-logging
